name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython
    - name: Build with Buildozer
      env:
        ANDROIDSDK_ACCEPT_LICENSES: "True"
      run: |
        buildozer init
        # Update requirements
        sed -i 's/^requirements =.*/requirements = python3,kivy,kivymd,requests,pyrebase4,plyer,urllib3,charset-normalizer,idna,certifi/' buildozer.spec
        # 'yes |' automatically pipes "y" into the command for all license prompts
        yes | buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
